spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/heart_rehabilitation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      platform: postgres

app:
  jwt:
    secret: ${JWT_SECRET:heartrehabilitationsecretkey}
    expiration-ms: 86400000 # 24 hours

logging:
  level:
    com.heart.rehabilitation: DEBUG
    org.springframework.security: DEBUG